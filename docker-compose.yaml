services:

  backend: 

    build: . 

    container_name: dsw_backend

    env_file: ./.env
    environment: 
      - DBHOST=dsw_backend

    ports: 
      - '3000:3000'

    # depends_on:
    #   mariadb:
    #     condition: service_healthy
      

  db:
    image: mariadb:latest 

    container_name: dsw_database

    env_file: ./.env

    environment: 
      - MARIADB_DATABASE=CocherasUTN
      - MARIADB_USER=$DBUSER
      - MARIADB_PASSWORD=$DBPASS
      - MARIADB_ROOT_PASSWORD=$DBPASS

    ports:
      - '3306:3306'

    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 20s
volumes:
  mariadb_data:
      



